name: Feature request
description: Propose an improvement to XAgent
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please explain the problem and the desired outcome.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: A short title for the feature request
      placeholder: Add LangGraph adapter scaffold
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: It is difficult to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you want to see
      placeholder: Add...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternatives or workarounds you have considered
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add links, references, or examples if useful
